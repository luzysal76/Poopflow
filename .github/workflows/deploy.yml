name: Deploy to GitHub Pages

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: "stable"
          cache: true

      - name: Flutter pub get
        working-directory: apps/mobile
        run: flutter pub get

      - name: Build APK (debug)
        working-directory: apps/mobile
        run: flutter build apk --debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: poopflow-debug-${{ github.run_number }}
          path: apps/mobile/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Build Next.js Web App
        working-directory: apps/web
        run: |
          npm ci
          npm run build
          touch out/.nojekyll

      - name: Build Toss Mini App
        working-directory: apps/toss
        run: |
          npm ci
          npm run build

      - name: Merge build outputs
        run: |
          mkdir -p _site
          cp -r apps/web/out/* _site/
          mkdir -p _site/toss
          cp -r apps/toss/dist/* _site/toss/
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
