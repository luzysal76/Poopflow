name: Deploy to GitHub Pages

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Build Next.js Web App
        working-directory: apps/web
        run: |
          npm ci
          npm run build
          touch out/.nojekyll

      - name: Build Toss Mini App
        working-directory: apps/toss
        run: |
          npm ci
          npm run build

      - name: Merge build outputs
        run: |
          mkdir -p _site
          cp -r apps/web/out/* _site/
          mkdir -p _site/toss
          cp -r apps/toss/dist/* _site/toss/
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
